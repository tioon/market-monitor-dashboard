name: Daily dashboard refresh

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'src/data/snapshot.json'

permissions:
  contents: write

concurrency:
  group: daily-dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Refresh data and build site
        run: npm run build

      - name: Sync build output into docs
        run: |
          rsync -a --delete --exclude '.nojekyll' dist/ docs/

      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- src/data/snapshot.json docs; then
            echo "No refresh changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A src/data/snapshot.json docs
          git commit -m "chore: refresh dashboard snapshot"
          git push origin HEAD:main
